name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/artifacts
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Determine version bump
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "No version label found. Skipping release."
            echo "type=skip" >> $GITHUB_OUTPUT
          fi

      - name: Get latest tag
        if: steps.bump.outputs.type != 'skip'
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Calculate next version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          CURRENT="${{ steps.tag.outputs.latest }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      - name: Run tests
        if: steps.bump.outputs.type != 'skip'
        run: swift test

      - name: Build universal binary (CLI)
        if: steps.bump.outputs.type != 'skip'
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/pry \
            .build/x86_64-apple-macosx/release/pry \
            -output pry-universal
          chmod +x pry-universal

      - name: Build PryApp.app bundle
        if: steps.bump.outputs.type != 'skip'
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          VERSION_SHORT="${VERSION#v}"

          # Build for both architectures
          swift build -c release --product PryApp --arch arm64
          swift build -c release --product PryApp --arch x86_64

          # Create universal binary
          lipo -create \
            .build/arm64-apple-macosx/release/PryApp \
            .build/x86_64-apple-macosx/release/PryApp \
            -output PryApp-universal

          # Create .app bundle
          APP="PryApp.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp PryApp-universal "$APP/Contents/MacOS/PryApp"
          chmod +x "$APP/Contents/MacOS/PryApp"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>PryApp</string>
            <key>CFBundleIdentifier</key>
            <string>dev.fsaldivar.pry</string>
            <key>CFBundleName</key>
            <string>Pry</string>
            <key>CFBundleDisplayName</key>
            <string>Pry</string>
            <key>CFBundleVersion</key>
            <string>${VERSION_SHORT}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION_SHORT}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSUIElement</key>
            <false/>
          </dict>
          </plist>
          PLIST

          # Zip the .app bundle
          ditto -c -k --sequesterRsrc --keepParent "$APP" PryApp.zip
          echo "PryApp.app bundle created and zipped"

      - name: Generate checksums
        if: steps.bump.outputs.type != 'skip'
        run: |
          shasum -a 256 pry-universal PryApp.zip > checksums.txt
          cat checksums.txt

      - name: Create release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          gh release create "$VERSION" \
            --title "$VERSION — $PR_TITLE" \
            --notes "## Changes

          $PR_BODY

          ## Installation

          ### CLI
          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${VERSION}/pry-universal -o pry
          chmod +x pry
          sudo mv pry /usr/local/bin/
          \`\`\`

          ### GUI App
          1. Download \`PryApp.zip\` from assets below
          2. Unzip and move \`PryApp.app\` to \`/Applications/\`
          3. First launch: right-click → Open (unsigned app)

          ## Checksums
          \`\`\`
          $(cat checksums.txt)
          \`\`\`" \
            pry-universal PryApp.zip checksums.txt

      - name: Create labels if missing
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create major --color D93F0B --description "Major version bump" --force
          gh label create minor --color 0E8A16 --description "Minor version bump" --force
          gh label create patch --color 1D76DB --description "Patch version bump" --force
